<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR Attendance</title>

  <!-- ✅ FIXED QR LIBRARY (important) -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    h1 {
      margin-bottom: 1rem;
    }

    .card {
      background: white;
      padding: 1.5rem;
      border-radius: 12px;
      width: 100%;
      max-width: 360px;
      border: 1px solid #ddd;
    }

    #reader {
      width: 100%;
      margin-bottom: 1rem;
    }

    button {
      width: 100%;
      padding: 0.7rem;
      margin-top: 0.5rem;
      border: none;
      border-radius: 8px;
      background: black;
      color: white;
      cursor: pointer;
    }

    input {
      width: 100%;
      padding: 0.6rem;
      margin-top: 0.5rem;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    #status {
      margin-top: 1rem;
      padding: 0.6rem;
      border-radius: 8px;
      text-align: center;
      background: #eee;
    }

    #status.success { background: #d4f7dc; }
    #status.late { background: #fff3cd; }
    #status.error { background: #f8d7da; }
  </style>
</head>

<body>

<h1>📋 QR Attendance</h1>

<div class="card">

  <div id="reader"></div>

  <button onclick="toggleScanner()">Start Scanner</button>

  <input id="manualId" placeholder="Enter ID..." />
  <button onclick="submitManual()">Submit</button>

  <div id="status">Waiting...</div>

</div>

<script>
console.log("JS Loaded");

// 🔐 Airtable setup
const AIRTABLE_API_KEY = "YOUR_API_KEY";
const BASE_ID = "YOUR_BASE_ID";
const TABLE_NAME = "Student Attendance";
const QR_FIELD = "QR";
const STATUS_FIELD = "Status";
const LATE_AFTER = "08:30";

// scanner state
let scanner;
let running = false;
let lastScan = null;
let cooldown = false;

// 🧠 Decide Present or Late
function getStatus() {
  const [h, m] = LATE_AFTER.split(":").map(Number);
  const now = new Date();
  const cutoff = new Date(now);
  cutoff.setHours(h, m, 0, 0);

  return now > cutoff ? "Late" : "Present";
}

// 🎨 UI update
function setStatus(type, msg) {
  const el = document.getElementById("status");
  el.className = type;
  el.textContent = msg;
}

// 📡 MAIN LOGIC
async function markAttendance(value) {
  value = value.trim();

  setStatus("", "Looking up record...");

  try {
    const url =
      `https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(TABLE_NAME)}` +
      `?filterByFormula=${encodeURIComponent(`{${QR_FIELD}}="${value}"`)}`;

    const res = await fetch(url, {
      headers: {
        Authorization: `Bearer ${AIRTABLE_API_KEY}`
      }
    });

    const data = await res.json();

    if (!data.records || data.records.length === 0) {
      setStatus("error", "No record found");
      return;
    }

    const recordId = data.records[0].id;
    const status = getStatus();

    const upd = await fetch(
      `https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(TABLE_NAME)}/${recordId}`,
      {
        method: "PATCH",
        headers: {
          Authorization: `Bearer ${AIRTABLE_API_KEY}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          fields: {
            [STATUS_FIELD]: status
          }
        })
      }
    );

    if (!upd.ok) throw new Error("Update failed");

    setStatus(
      status === "Late" ? "late" : "success",
      `Marked ${status}: ${value}`
    );

  } catch (e) {
    setStatus("error", e.message);
  }
}

// ⌨️ manual input
function submitManual() {
  const val = document.getElementById("manualId").value.trim();
  if (!val) return;

  document.getElementById("manualId").value = "";
  markAttendance(val);
}

// 📷 QR scanner
function toggleScanner() {
  if (running) {
    scanner.clear();
    running = false;
    return;
  }

  scanner = new Html5QrcodeScanner("reader", {
    fps: 10,
    qrbox: 200
  });

  scanner.render(onScanSuccess);
  running = true;
}

// 🎯 scan result
function onScanSuccess(qr) {
  if (cooldown || qr === lastScan) return;

  cooldown = true;
  lastScan = qr;

  markAttendance(qr);

  setTimeout(() => {
    cooldown = false;
    lastScan = null;
  }, 3000);
}
</script>

</body>
</html>
